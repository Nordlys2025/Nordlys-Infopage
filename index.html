<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Visitenkarte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-sm w-full bg-white rounded-2xl shadow-xl overflow-hidden transform transition hover:scale-105 duration-300">
        <div class="h-24 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
        
        <div class="px-6 pb-8">
            <div class="relative -mt-12 flex justify-center">
                <div class="bg-white p-1 rounded-full shadow-lg text-4xl">
                    🚀
                </div>
            </div>

            <div class="text-center mt-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Dein Name</h1>
                <p class="text-indigo-600 font-medium">Software-Entwickler & Creator</p>
                <p class="text-slate-500 text-sm mt-2 px-4">
                    Ich baue digitale Lösungen und teile mein Wissen auf GitHub.
                </p>
            </div>

            <div class="mt-6 space-y-3">
                <a href="mailto:deine-mail@beispiel.de" 
                   class="block w-full text-center py-3 px-4 bg-slate-800 text-white rounded-lg font-semibold hover:bg-slate-700 transition">
                   E-Mail senden
                </a>
                
                <div class="flex gap-3">
                    <a href="https://github.com/dein-nutzername" 
                       class="flex-1 text-center py-3 border border-slate-200 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition">
                       GitHub
                    </a>
                    <a href="https://linkedin.com/in/dein-profil" 
                       class="flex-1 text-center py-3 border border-slate-200 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition">
                       LinkedIn
                    </a>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <span class="text-xs text-slate-400 uppercase tracking-widest">Scan für mehr Infos</span>
            </div>
        </div>
    </div>

</body>
</html>
