<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordlys - Visitenkarte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hier fügen wir die Struktur für den Hintergrund hinzu */
        .bg-structure {
            background-color: #f2f3ea;
            background-image: radial-gradient(#d1d2c7 0.5px, transparent 0.5px);
            background-size: 10px 10px;
        }
    </style>
</head>
<body class="bg-structure flex items-center justify-center min-h-screen p-4">

    <div class="max-w-sm w-full bg-white rounded-2xl shadow-2xl overflow-hidden transform transition hover:scale-105 duration-300">
        <div class="h-24 bg-[#767a3f] shadow-inner"></div>
        
        <div class="px-6 pb-8">
            <div class="relative -mt-16 flex justify-center">
                <div class="bg-white p-1 rounded-full shadow-lg overflow-hidden w-32 h-32 border-4 border-white text-center flex items-center justify-center">
                    <img src="images/Nordlys_Logo_Transparent.png" 
                         alt="Nordlys Logo" 
                         class="w-full h-full object-contain p-2">
                </div>
            </div>

            <div class="text-center mt-4 border-b border-slate-100 pb-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Stefanie Timm & Jannik Hein</h1>
                <p class="text-[#767a3f] font-semibold uppercase text-xs tracking-widest mt-1 italic">Nordlys – Sauberkeit mit Herz</p>
            </div>

            <div class="mt-5 text-center px-2">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 text-center">Referenzen & Service</h2>
                <p class="text-slate-600 text-sm leading-relaxed">
                    Wir sorgen für strahlende Reinheit. Gründlich, zuverlässig und mit nordischer Frische für Ihr Objekt.
                </p>
            </div>

            <div class="mt-6 space-y-3">
                <a href="mailto:nordlys.sauberkeit.mit.herz@gmail.com" 
                   class="flex items-center justify-center gap-2 w-full text-center py-3 px-4 bg-[#767a3f] text-white rounded-lg font-semibold hover:bg-[#5f6332] transition shadow-md">
                   <span>✉️</span> E-Mail senden
                </a>
                
                <div class="flex gap-3">
                    <a href="galerie.html" 
                       class="flex-1 flex items-center justify-center gap-2 py-3 border-2 border-[#767a3f] rounded-lg text-[#767a3f] font-bold hover:bg-[#767a3f] hover:text-white transition text-sm">
                       <span>📸</span> Galerie
                    </a>
                    <a href="tel:+49123456789" 
                       class="flex-1 flex items-center justify-center gap-2 py-3 border-2 border-[#767a3f] rounded-lg text-[#767a3f] font-bold hover:bg-[#767a3f] hover:text-white transition text-sm">
                       <span>📞</span> Anrufen
                    </a>
                </div>
            </div>

            <div class="mt-8 pt-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em]">Kappeln & Umgebung</p>
            </div>
        </div>
    </div>

</body>
</html>
