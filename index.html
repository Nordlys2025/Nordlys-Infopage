<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Visitenkarte</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 300px; }
        h1 { margin: 10px 0; font-size: 1.5rem; }
        p { color: #666; }
        .links a { display: block; margin: 10px 0; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dein Name</h1>
        <p>Software-Entwickler / Dein Beruf</p>
        <div class="links">
            <a href="mailto:deine-mail@beispiel.de">E-Mail schreiben</a>
            <a href="https://linkedin.com/in/dein-profil">LinkedIn</a>
            <a href="https://github.com/dein-nutzername">Mein GitHub</a>
        </div>
    </div>
</body>
</html>
