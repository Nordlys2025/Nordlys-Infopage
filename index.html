<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordlys - Sauberkeit mit Herz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2f3ea] flex items-center justify-center min-h-screen p-4">

    <div class="max-w-sm w-full bg-white rounded-2xl shadow-xl overflow-hidden transform transition hover:scale-105 duration-300">
        <div class="h-24 bg-[#767a3f]"></div>
        
        <div class="px-6 pb-8">
            <div class="relative -mt-16 flex justify-center">
                <div class="bg-white p-1 rounded-full shadow-lg overflow-hidden w-32 h-32 border-4 border-white">
                    <img src="images/Nordlys_Logo_Transparent.png" 
                         alt="Nordlys Logo" 
                         class="w-full h-full object-contain p-2">
                </div>
            </div>

            <div class="text-center mt-4 border-b border-slate-100 pb-4">
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Stefanie Timm & Jannik Hein</h1>
                <p class="text-[#767a3f] font-semibold uppercase text-xs tracking-widest mt-1">Nordlys – Sauberkeit mit Herz</p>
            </div>

            <div class="mt-5 text-center px-2">
                <h2 class="text-sm font-bold text-slate-700 uppercase mb-2">Über uns</h2>
                <p class="text-slate-600 text-sm leading-relaxed italic">
                    "Wir sorgen für strahlende Reinheit in Ihren Räumen. Ob Privathaushalt oder Büro – wir stehen für Gründlichkeit, Zuverlässigkeit und einen nordisch-frischen Service."
                </p>
            </div>

            <div class="mt-6 space-y-3">
                <a href="mailto:nordlys.sauberkeit.mit.herz@gmail.com" 
                   class="flex items-center justify-center gap-2 w-full text-center py-3 px-4 bg-[#767a3f] text-white rounded-lg font-semibold hover:bg-[#5f6332] transition shadow-md">
                   <span>✉️</span> Jetzt Anfragen
                </a>
                
                <div class="flex gap-3">
                    <a href="https://github.com/DEIN-GITHUB-NAME" 
                       class="flex-1 flex items-center justify-center gap-2 py-3 border border-[#767a3f] rounded-lg text-[#767a3f] font-medium hover:bg-[#f2f3ea] transition text-sm">
                       <span>💻</span> GitHub
                    </a>
                    <a href="tel:+49123456789" 
                       class="flex-1 flex items-center justify-center gap-2 py-3 border border-[#767a3f] rounded-lg text-[#767a3f] font-medium hover:bg-[#f2f3ea] transition text-sm">
                       <span>📞</span> Anrufen
                    </a>
                </div>
            </div>

            <div class="mt-8 pt-4 text-center">
                <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em]">Kappeln & Umgebung</p>
            </div>
        </div>
    </div>

</body>
</html>
